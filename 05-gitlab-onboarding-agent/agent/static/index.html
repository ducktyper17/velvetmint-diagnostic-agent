<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blast Radius — Zero-Day Response</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1020;
        --panel: #121a33;
        --border: #2a355f;
        --text: #e8ecff;
        --muted: #9aa6d1;
        --accent: #6ea8ff;
        --danger: #ff6b6b;
        --ok: #4ade80;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, sans-serif;
        background: radial-gradient(circle at top, #152046, var(--bg));
        color: var(--text);
      }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 20px 64px; }
      h1 { margin: 0 0 8px; font-size: 2rem; }
      p.lead { color: var(--muted); margin: 0 0 24px; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      .panel {
        background: rgba(18, 26, 51, 0.9);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
      }
      label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; }
      input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #0d1430;
        color: var(--text);
        margin-bottom: 12px;
      }
      button {
        background: linear-gradient(135deg, #4f7cff, #6ea8ff);
        color: white;
        border: 0;
        border-radius: 10px;
        padding: 12px 16px;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled { opacity: 0.6; cursor: wait; }
      .stream {
        height: 520px;
        overflow: auto;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.85rem;
        line-height: 1.45;
        white-space: pre-wrap;
      }
      .event { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed var(--border); }
      .tag {
        display: inline-block;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        padding: 2px 8px;
        border-radius: 999px;
        margin-right: 8px;
      }
      .tag.thought { background: #22305f; color: var(--accent); }
      .tag.tool_call { background: #3a2448; color: #f0abfc; }
      .tag.tool_result { background: #1f3a2d; color: var(--ok); }
      .tag.final_report { background: #4a3218; color: #fbbf24; }
      .tag.error { background: #4a1d1d; color: var(--danger); }
      .summary {
        margin-top: 16px;
        padding: 14px;
        border-radius: 12px;
        background: #101935;
        border: 1px solid var(--border);
      }
      @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Blast Radius</h1>
      <p class="lead">
        GitLab-track zero-day response agent. Streams reasoning, GitLab actions, and the final incident summary.
      </p>
      <div class="grid">
        <section class="panel">
          <h2>Trigger incident</h2>
          <label>CVE ID</label>
          <input id="cve_id" value="CVE-2026-4242" />
          <label>Title</label>
          <input id="incident_title" value="Critical log4js vulnerability" />
          <label>Vulnerable package</label>
          <input id="vulnerable_package" value="log4js" />
          <label>Fixed version</label>
          <input id="fixed_version" value="6.9.1" />
          <button id="run_btn">Analyze blast radius</button>
        </section>
        <section class="panel">
          <h2>Executive summary</h2>
          <div id="summary" class="summary">Run an analysis to see the final report.</div>
        </section>
      </div>
      <section class="panel" style="margin-top: 16px">
        <h2>Live stream</h2>
        <div id="stream" class="stream"></div>
      </section>
    </div>
    <script>
      const streamEl = document.getElementById("stream");
      const summaryEl = document.getElementById("summary");
      const runBtn = document.getElementById("run_btn");

      function appendEvent(type, payload) {
        const row = document.createElement("div");
        row.className = "event";
        const tag = document.createElement("span");
        tag.className = `tag ${type}`;
        tag.textContent = type;
        row.appendChild(tag);
        const text = document.createElement("span");
        if (type === "thought") {
          text.textContent = payload.text || JSON.stringify(payload);
        } else if (type === "tool_call") {
          text.textContent = `${payload.name} ${JSON.stringify(payload.args || {})}`;
        } else if (type === "tool_result") {
          text.textContent = `${payload.name}: ${JSON.stringify(payload.result || {})}`;
        } else {
          text.textContent = JSON.stringify(payload, null, 2);
        }
        row.appendChild(text);
        streamEl.appendChild(row);
        streamEl.scrollTop = streamEl.scrollHeight;
      }

      runBtn.addEventListener("click", async () => {
        streamEl.innerHTML = "";
        summaryEl.textContent = "Running analysis...";
        runBtn.disabled = true;

        const body = {
          cve_id: document.getElementById("cve_id").value,
          incident_title: document.getElementById("incident_title").value,
          vulnerable_package: document.getElementById("vulnerable_package").value,
          fixed_version: document.getElementById("fixed_version").value,
        };

        const response = await fetch("/incidents/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const chunks = buffer.split("\n\n");
          buffer = chunks.pop() || "";
          for (const chunk of chunks) {
            const lines = chunk.split("\n");
            let eventType = "message";
            let data = "";
            for (const line of lines) {
              if (line.startsWith("event:")) eventType = line.slice(6).trim();
              if (line.startsWith("data:")) data += line.slice(5).trim();
            }
            if (!data) continue;
            const payload = JSON.parse(data);
            appendEvent(eventType, payload);
            if (eventType === "final_report") {
              const summary =
                payload.executive_summary ||
                `${payload.cve_id}: ${payload.services_affected} services affected. ` +
                  `Highest risk: ${payload.highest_risk_service}. ${payload.next_action}`;
              summaryEl.textContent = summary;
            }
          }
        }

        runBtn.disabled = false;
      });
    </script>
  </body>
</html>
